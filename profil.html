<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#E8B8B0" />
  <title>Profil · Kurul Soru Bankası</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-frame profil-frame">

    <header class="app-header" style="text-align:center; position:relative;">
      <a href="index.html" class="admin-link" style="left:24px; right:auto;">←</a>
      <div class="brand">
        <span class="brand-mark">✦</span>
        <h1 class="brand-name">Profil</h1>
      </div>
      <p class="brand-sub">İstatistikler & Geçmiş</p>
    </header>

    <!-- Giriş yapılmamışsa -->
    <div class="profil-giris" id="profilGiris" hidden>
      <div class="profil-giris-kart">
        <span style="font-size:40px;">👤</span>
        <h2 class="profil-giris-baslik">Giriş Yap</h2>
        <p class="profil-giris-text">İstatistiklerini görmek ve sınav geçmişini takip etmek için Google hesabınla giriş yap.</p>
        <button class="start-btn" id="profilGirisBtn" style="margin-top:8px;">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="flex-shrink:0;">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
            <path d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Google ile Giriş Yap
        </button>
      </div>
    </div>

    <!-- Giriş yapılmışsa -->
    <main class="profil-main" id="profilMain" hidden>

      <!-- Kullanıcı kartı -->
      <div class="kullanici-kart">
        <img class="kullanici-foto" id="kullaniciFoto" src="" alt="" />
        <div class="kullanici-bilgi">
          <p class="kullanici-ad" id="kullaniciAd">—</p>
          <p class="kullanici-email" id="kullaniciEmail">—</p>
        </div>
        <button class="cikis-btn" id="cikisBtn">Çıkış</button>
      </div>

      <!-- Genel istatistik -->
      <section class="istat-section">
        <h3 class="section-title">Genel Durum</h3>
        <div class="istat-grid">
          <div class="istat-kart">
            <span class="istat-num" id="toplamSinav">—</span>
            <span class="istat-label">Sınav</span>
          </div>
          <div class="istat-kart">
            <span class="istat-num" id="toplamSoru">—</span>
            <span class="istat-label">Soru</span>
          </div>
          <div class="istat-kart">
            <span class="istat-num" id="ortalamaYuzde">—</span>
            <span class="istat-label">Ort. %</span>
          </div>
          <div class="istat-kart">
            <span class="istat-num" id="enYuksek">—</span>
            <span class="istat-label">En Yüksek</span>
          </div>
        </div>
      </section>

      <!-- Ders bazında performans -->
      <section class="istat-section">
        <h3 class="section-title">Ders Bazında</h3>
        <div id="dersIstatList"></div>
      </section>

      <!-- Geçmiş sınavlar -->
      <section class="istat-section">
        <h3 class="section-title">Sınav Geçmişi</h3>
        <div id="gegmisSinavList">
          <p class="liste-bos">Yükleniyor...</p>
        </div>
      </section>

    </main>

  </div>

  <script type="module" src="js/profil.js"></script>
</body>
</html>

<!DOCTYPE html>

<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#F4D6D6" />
  <title>Kurul Soru Bankası</title>

  <!-- Fonts -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-frame">

<!-- Üst başlık -->
<header class="app-header">
  <div class="brand">
    <span class="brand-mark">✦</span>
    <h1 class="brand-name">Kurul</h1>
  </div>
  <p class="brand-sub">Soru Bankası</p>
</header>

<!-- İçerik -->
<main class="app-main">

  <section class="hero-card">
    <p class="hero-eyebrow">Hoş geldin</p>
    <h2 class="hero-title">Bugün hangi kurula <em>çalışıyorsun?</em></h2>
    <p class="hero-text">Aşağıdan filtreleri seç, kendine bir mini sınav hazırla.</p>
  </section>

  <!-- Filtre alanı -->
  <section class="filters">

    <div class="filter-group">
      <label class="filter-label" for="donem">Dönem</label>
      <select class="filter-select" id="donem">
        <option value="">Tüm dönemler</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="kurul">Kurul</label>
      <select class="filter-select" id="kurul" disabled>
        <option value="">Önce dönem seç</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="ders">Ders</label>
      <select class="filter-select" id="ders" disabled>
        <option value="">Tüm dersler</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="soru-sayisi">Soru sayısı</label>
      <div class="count-row">
        <button class="count-btn" data-count="10">10</button>
        <button class="count-btn" data-count="20">20</button>
        <button class="count-btn active" data-count="30">30</button>
        <button class="count-btn" data-count="50">50</button>
      </div>
    </div>

    <p class="available-info" id="availableInfo">Filtre seçimine göre uygun soru bulunamadı.</p>

  </section>

</main>

<!-- Alt eylem çubuğu -->
<footer class="app-footer">
  <button class="start-btn" id="startBtn" disabled>
    Sınava Başla
    <span class="start-btn-icon">→</span>
  </button>
</footer>

  </div>

  <script src="js/app.js"></script>

</body>
</html>

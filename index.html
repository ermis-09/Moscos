<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FFF0EB" />
  <title>Moscos · Soru Bankası</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Moscos" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-frame">

    <header class="app-header">
      <button class="giris-btn" id="girisBtn">Giriş Yap</button>
      <div class="profil-btn" id="profilBtn" hidden>
        <img class="profil-foto" id="profilFoto" src="" alt="" />
        <span class="profil-ad" id="profilAd"></span>
      </div>
      <div class="brand">
        <span class="brand-mark">✦</span>
        <h1 class="brand-name">Moscos</h1>
      </div>
      <p class="brand-sub">Soru Bankası</p>
      <a href="admin.html" class="admin-link">⚙</a>
    </header>

    <main class="app-main">

      <!-- Yükleme iskeleti -->
      <div id="skeleton" class="skeleton-wrap">
        <div class="skeleton-label"></div>
        <div class="skeleton-row">
          <div class="skeleton-kart"></div>
          <div class="skeleton-kart"></div>
          <div class="skeleton-kart"></div>
        </div>
      </div>

      <!-- Filtre içeriği -->
      <div id="filterContent" hidden>

        <!-- Dönem seçimi -->
        <div class="filter-step" id="stepDonem">
          <p class="step-label">Dönem</p>
          <div class="donem-grid" id="donemGrid"></div>
        </div>

        <!-- Kurul seçimi -->
        <div class="filter-step" id="stepKurul" hidden>
          <p class="step-label">
            <button class="geri-btn" id="geriDonem">←</button>
            Kurul
          </p>
          <div class="kurul-grid" id="kurulGrid"></div>
        </div>

        <!-- Ders seçimi -->
        <div class="filter-step" id="stepDers" hidden>
          <p class="step-label">
            <button class="geri-btn" id="geriKurul">←</button>
            Ders
          </p>
          <div class="chip-row" id="dersChips"></div>
        </div>

      </div>

    </main>

    <footer class="app-footer" id="appFooter">
      <a href="simulasyon.html" class="sim-btn">
        Simülasyon Modu <span>⟳</span>
      </a>
      <div id="footerInfo" hidden>
        <p class="available-info" id="availableInfo"></p>
        <button class="start-btn" id="startBtn" disabled>
          Sınava Başla
          <span class="start-btn-icon">→</span>
        </button>
      </div>
    </footer>

  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>

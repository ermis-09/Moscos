<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RoseStudy App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1 id="app-title">RoseStudy</h1>
        </header>

        <main class="content">
            <!-- Ana Menü -->
            <section id="menu" class="view">
                <div class="welcome-card">
    <p>Bugün ne çalışmak istersin?</p>
    <div class="upload-container">
        <label for="file-input" class="custom-upload-btn">
            <span id="upload-icon">📄</span>
            <span id="file-name-display">Yeni XML Yükle</span>
        </label>
        <input type="file" id="file-input" accept=".xml">
    </div>
</div>

            </section>

            <!-- Quiz Ekranı -->
            <section id="quiz-screen" class="view hidden">
                <div id="q-progress"></div>
                <div id="question"></div>
                <div id="options"></div>
                <button id="next-btn" class="main-btn hidden" onclick="nextQuestion()">Sıradaki Soru</button>
            </section>

            <!-- Flashcard Ekranı -->
            <section id="flashcard-screen" class="view hidden">
                <div class="flashcard-container" onclick="flipCard()">
                    <div class="flashcard">
                        <div class="face front" id="f-front"></div>
                        <div class="face back" id="f-back"></div>
                    </div>
                </div>
                <button class="main-btn" onclick="nextFlashcard()">Sıradaki Kart →</button>
            </section>

            <!-- Sonuç Ekranı -->
            <section id="result-screen" class="view hidden">
                <div id="score-summary"></div>
                <div class="optik-grid" id="optik-view"></div>
                <div id="review-box" class="hidden"></div>
                <button class="main-btn" onclick="showView('menu')">Ana Menü</button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

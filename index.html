<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#E8B8B0" />
  <title>Kurul Soru Bankası</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

	<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Kurul" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-frame">

    <header class="app-header">
  <div class="brand">
    <span class="brand-mark">✦</span>
    <h1 class="brand-name">Kurul</h1>
  </div>
  <p class="brand-sub">Soru Bankası</p>
  <a href="admin.html" class="admin-link">⚙</a>
</header>


    <main class="app-main">

      <section class="hero">
        <p class="hero-eyebrow">Hoş geldin</p>
        <h2 class="hero-title">Bugün hangi kurula <em>çalışıyorsun?</em></h2>
      </section>

      <section class="filters">

        <div class="filter-block">
          <span class="filter-label">Dönem</span>
          <div class="chip-row" id="donemChips">
            <button class="chip" data-value="1">1. Dönem</button>
            <button class="chip" data-value="2">2. Dönem</button>
            <button class="chip" data-value="3">3. Dönem</button>
          </div>
        </div>

        <div class="filter-block">
          <span class="filter-label">Kurul</span>
          <div class="chip-row" id="kurulChips">
            <button class="chip" disabled>Önce dönem</button>
          </div>
        </div>

        <div class="filter-block">
          <span class="filter-label">Ders</span>
          <div class="chip-row" id="dersChips">
            <button class="chip active" data-value="">Tüm dersler</button>
          </div>
        </div>

        <div class="filter-block">
          <span class="filter-label">Soru Sayısı</span>
          <div class="chip-row chip-row-equal">
            <button class="chip active" data-count="5">5</button>
            <button class="chip" data-count="10">10</button>
            <button class="chip" data-count="20">20</button>
            <button class="chip" data-count="50">50</button>
          </div>
        </div>

      </section>

    </main>

    <footer class="app-footer">
      <p class="available-info" id="availableInfo">Filtreleri seç</p>
      <button class="start-btn" id="startBtn" disabled>
        Sınava Başla
        <span class="start-btn-icon">→</span>
      </button>
    </footer>

  </div>

  <script type="module" src="js/app.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/MobilSoru/sw.js');
  }
</script>

</body>
</html>

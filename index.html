<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1C1A15" />
  <title>Moscos · Soru Bankası</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,600;9..144,0,700;9..144,1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Moscos" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-frame">

  <!-- Köşe süsler -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- Üst bar -->
  <header class="top-bar">
    <button class="giris-btn" id="girisBtn">Giriş Yap</button>
    <div class="profil-btn" id="profilBtn" hidden>
      <img class="profil-foto" id="profilFoto" src="" alt="" />
      <span class="profil-ad" id="profilAd"></span>
    </div>
    <div class="brand">
      <span class="brand-name">M<span class="brand-os">os</span>cos</span>
      <span class="brand-sub">Soru Bankası</span>
    </div>
    <a href="admin.html" class="admin-link">⚙</a>
  </header>

  <!-- Ana çark alanı -->
  <main class="wheel-area">

    <!-- Dişli halka -->
    <div class="gear-ring"></div>

    <!-- Çark -->
    <div class="wheel" id="wheel">
      <!-- Merkez buton -->
      <div class="center-btn" id="centerBtn">
        <span class="center-m">M</span>
        <span class="center-hint" id="centerHint">aç</span>
      </div>
    </div>

    <!-- Hologram huzme -->
<div class="hologram-beam" id="hologramBeam">
  <div class="hologram-symbol" id="hologramSymbol">
    <svg id="hologramSvg" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="hologram-rays"></div>
  <div class="hologram-base"></div>
</div>


    <!-- Breadcrumb -->
    <div class="breadcrumb" id="breadcrumb" hidden>
      <div class="breadcrumb-inner" id="breadcrumbInner"></div>
    </div>

  </main>

  <!-- Alt bilgi -->
  <footer class="bottom-bar">
    <div class="info-text" id="infoText">Yükleniyor...</div>
    <div class="footer-btns" id="footerBtns" hidden>
      <button class="start-btn" id="startBtn">
        Başla <span>→</span>
      </button>
    </div>
    <div class="drag-hint">◀ sürükle ▶ · çift bas: geri</div>
  </footer>

</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
<script type="module" src="js/app.js"></script>
</body>
</html>

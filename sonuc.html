<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#E8B8B0" />
  <title>Sonuç · Kurul Soru Bankası</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-frame result-frame" id="resultFrame" hidden>


    <!-- Skor başlığı -->
    <header class="result-header">
      <p class="result-eyebrow">Sınav tamamlandı</p>
      <div class="score-display">
        <span class="score-big" id="scoreBig">—</span>
        <span class="score-total" id="scoreTotal">/ —</span>
      </div>
      <p class="score-percent" id="scorePercent">—</p>
      <p class="score-message" id="scoreMessage">—</p>

      <div class="score-stats">
        <div class="stat-pill stat-correct">
          <span class="stat-num" id="statCorrect">0</span>
          <span class="stat-label">Doğru</span>
        </div>
        <div class="stat-pill stat-wrong">
          <span class="stat-num" id="statWrong">0</span>
          <span class="stat-label">Yanlış</span>
        </div>
        <div class="stat-pill stat-blank">
          <span class="stat-num" id="statBlank">0</span>
          <span class="stat-label">Boş</span>
        </div>
      </div>
    </header>

    <main class="result-main">

      <!-- Ders bazında dağılım -->
      <section class="ders-breakdown" id="dersBreakdown">
        <h3 class="section-title">Ders Bazında</h3>
        <div class="ders-list" id="dersList"></div>
      </section>

      <!-- Soru listesi -->
      <section class="review-section">
        <div class="review-header">
          <h3 class="section-title">Sorular</h3>
          <button class="filter-toggle" id="filterToggle">Sadece yanlışlar</button>
        </div>
        <div class="review-list" id="reviewList"></div>
      </section>

    </main>

    <!-- Alt aksiyonlar -->
    <footer class="result-footer">
      <button class="nav-btn nav-prev" id="retryBtn">
        ↻ Tekrarla
      </button>
      <button class="nav-btn nav-next" id="newExamBtn">
        Yeni Sınav <span>→</span>
      </button>
    </footer>

  </div>

  
 <!-- OPTİK SONUÇ EKRANI -->
<div class="app-frame optik-frame" id="optikEkrani" hidden>

  <header class="result-header" id="optikHeader">
    <p class="result-eyebrow">Sınav Sonucu</p>
    <p class="optik-sinav-adi" id="optikSinavAdi">—</p>

    <div class="score-stats" style="margin-top: 20px;">
      <div class="stat-pill stat-correct">
        <span class="stat-num" id="optikDogru">0</span>
        <span class="stat-label">Doğru</span>
      </div>
      <div class="stat-pill stat-wrong">
        <span class="stat-num" id="optikYanlis">0</span>
        <span class="stat-label">Yanlış</span>
      </div>
      <div class="stat-pill stat-blank">
        <span class="stat-num" id="optikBos">0</span>
        <span class="stat-label">Boş</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="optikNet">0</span>
        <span class="stat-label">Net</span>
      </div>
    </div>
  </header>

  <main class="result-main">
    <div class="optik-tablo" id="optikTablo"></div>
  </main>

  <footer class="result-footer">
    <button class="nav-btn nav-next" id="optikYeniBtn" style="flex:1;">
      Yeni Sınav →
    </button>
  </footer>

</div>
 
  

  <script type="module" src="js/sonuc.js"></script>
</body>
</html>

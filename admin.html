<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1C1A15" />
  <title>Admin · Moscos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,600;9..144,0,700;9..144,1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="app-frame admin-frame">

    <!-- Köşe süsler -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Header -->
    <header class="profil-header">
      <a href="index.html" class="back-btn">←</a>
      <span class="profil-baslik">Admin</span>
      <div style="width:32px;"></div>
    </header>

    <!-- Giriş ekranı -->
    <div class="login-screen hidden" id="loginScreen">
      <div class="login-card">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect x="4" y="4" width="32" height="32" rx="6" stroke="#C8771A" stroke-width="2.5" fill="none"/>
          <line x1="13" y1="14" x2="27" y2="14" stroke="#C8771A" stroke-width="2" stroke-linecap="round"/>
          <line x1="13" y1="20" x2="27" y2="20" stroke="#C8771A" stroke-width="2" stroke-linecap="round"/>
          <line x1="13" y1="26" x2="21" y2="26" stroke="#C8771A" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h2 class="login-title">Admin Girişi</h2>
        <p class="login-text">Devam etmek için Google hesabınla giriş yap.</p>
        <button class="login-btn" id="loginBtn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
            <path d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Google ile Giriş Yap
        </button>
        <p class="login-error" id="loginError"></p>
      </div>
    </div>

    <main class="admin-main">

      <!-- Sekme seçici -->
      <div class="tab-row">
        <button class="tab active" data-tab="ekle">Soru Ekle</button>
        <button class="tab" data-tab="listele">Sorular</button>
        <button class="tab" data-tab="cikmis">Çıkmış</button>
        <button class="tab" data-tab="flash">Flashcard</button>
      </div>

      <!-- SORU EKLE -->
      <section class="tab-content" id="tab-ekle">
        <div class="form-group">
          <label class="form-label">Dönem</label>
          <div class="chip-row chip-row-equal" id="adminDonem">
            <button class="chip" data-value="1">D1</button>
            <button class="chip" data-value="2">D2</button>
            <button class="chip" data-value="3">D3</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Kurul</label>
          <input class="form-input" type="text" id="adminKurul" placeholder="örn. D2K5" />
        </div>
        <div class="form-group">
          <label class="form-label">Ders</label>
          <input class="form-input" type="text" id="adminDers" placeholder="örn. Patoloji" />
        </div>
        <div class="form-group">
          <label class="form-label">Öğrenim Hedefi <span class="optional">(opsiyonel)</span></label>
          <input class="form-input" type="text" id="adminHedef" placeholder="örn. Hücre zedelenmesi" />
        </div>
        <div class="form-group">
          <label class="form-label">Soru</label>
          <textarea class="form-input form-textarea" id="adminSoru" placeholder="Soru metnini yaz..." rows="3"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Seçenekler</label>
          <div class="options-form">
            <div class="option-row" data-harf="A"><span class="option-harf">A</span><input class="form-input" type="text" placeholder="A şıkkı" /></div>
            <div class="option-row" data-harf="B"><span class="option-harf">B</span><input class="form-input" type="text" placeholder="B şıkkı" /></div>
            <div class="option-row" data-harf="C"><span class="option-harf">C</span><input class="form-input" type="text" placeholder="C şıkkı" /></div>
            <div class="option-row" data-harf="D"><span class="option-harf">D</span><input class="form-input" type="text" placeholder="D şıkkı" /></div>
            <div class="option-row" data-harf="E"><span class="option-harf">E</span><input class="form-input" type="text" placeholder="E şıkkı" /></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Doğru Cevap</label>
          <div class="chip-row" id="adminCevap">
            <button class="chip" data-value="A">A</button>
            <button class="chip" data-value="B">B</button>
            <button class="chip" data-value="C">C</button>
            <button class="chip" data-value="D">D</button>
            <button class="chip" data-value="E">E</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Açıklama <span class="optional">(opsiyonel)</span></label>
          <textarea class="form-input form-textarea" id="adminAciklama" placeholder="Açıklama veya rationale..." rows="2"></textarea>
        </div>
        <p class="form-msg" id="formMsg"></p>
        <button class="start-btn" id="kaydetBtn">
          Soruyu Kaydet <span class="start-btn-icon">✓</span>
        </button>
      </section>

      <!-- SORULAR -->
      <section class="tab-content" id="tab-listele" hidden>
        <div class="list-filters">
          <input class="form-input" type="text" id="listKurul" placeholder="Kurul filtrele (örn. D2K5)" />
        </div>
        <div class="soru-listesi" id="soruListesi">
          <p class="liste-bos">Yükleniyor...</p>
        </div>

        <div class="modal" id="soruModal" hidden>
          <div class="modal-card">
            <div class="modal-header">
              <h3 class="modal-title">Soruyu Düzenle</h3>
              <button class="modal-kapat" id="modalKapat">✕</button>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label class="form-label">Dönem</label>
                <div class="chip-row chip-row-equal" id="editDonem">
                  <button class="chip" data-value="1">D1</button>
                  <button class="chip" data-value="2">D2</button>
                  <button class="chip" data-value="3">D3</button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Kurul</label>
                <input class="form-input" type="text" id="editKurul" />
              </div>
              <div class="form-group">
                <label class="form-label">Ders</label>
                <input class="form-input" type="text" id="editDers" />
              </div>
              <div class="form-group">
                <label class="form-label">Öğrenim Hedefi <span class="optional">(opsiyonel)</span></label>
                <input class="form-input" type="text" id="editHedef" />
              </div>
              <div class="form-group">
                <label class="form-label">Soru</label>
                <textarea class="form-input form-textarea" id="editSoru" rows="3"></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Seçenekler</label>
                <div class="options-form">
                  <div class="option-row" data-harf="A"><span class="option-harf">A</span><input class="form-input" type="text" id="editA" /></div>
                  <div class="option-row" data-harf="B"><span class="option-harf">B</span><input class="form-input" type="text" id="editB" /></div>
                  <div class="option-row" data-harf="C"><span class="option-harf">C</span><input class="form-input" type="text" id="editC" /></div>
                  <div class="option-row" data-harf="D"><span class="option-harf">D</span><input class="form-input" type="text" id="editD" /></div>
                  <div class="option-row" data-harf="E"><span class="option-harf">E</span><input class="form-input" type="text" id="editE" /></div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Doğru Cevap</label>
                <div class="chip-row" id="editCevap">
                  <button class="chip" data-value="A">A</button>
                  <button class="chip" data-value="B">B</button>
                  <button class="chip" data-value="C">C</button>
                  <button class="chip" data-value="D">D</button>
                  <button class="chip" data-value="E">E</button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Açıklama <span class="optional">(opsiyonel)</span></label>
                <textarea class="form-input form-textarea" id="editAciklama" rows="2"></textarea>
              </div>
              <p class="form-msg" id="editMsg"></p>
              <button class="start-btn" id="editKaydetBtn">
                Güncelle <span class="start-btn-icon">✓</span>
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- ÇIKMIŞ -->
      <section class="tab-content" id="tab-cikmis" hidden>
        <div class="form-group">
          <label class="form-label">Dönem</label>
          <div class="chip-row chip-row-equal" id="cikmisDonem">
            <button class="chip" data-value="1">D1</button>
            <button class="chip" data-value="2">D2</button>
            <button class="chip" data-value="3">D3</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Yıl</label>
          <input class="form-input" type="number" id="cikmisYil" placeholder="örn. 2024" />
        </div>
        <div class="form-group">
          <label class="form-label">Sınav Adı</label>
          <input class="form-input" type="text" id="cikmisSinav" placeholder="örn. Kurul 5" />
        </div>
        <div class="form-group">
          <label class="form-label">Kurul</label>
          <input class="form-input" type="text" id="cikmisKurul" placeholder="örn. D2K5" />
        </div>
        <div class="form-group">
          <label class="form-label">Ders</label>
          <input class="form-input" type="text" id="cikmisDers" placeholder="örn. Patoloji" />
        </div>
        <div class="form-group">
          <label class="form-label">Sıra No</label>
          <input class="form-input" type="number" id="cikmisSira" placeholder="örn. 1" />
        </div>
        <div class="form-group">
          <label class="form-label">Soru</label>
          <textarea class="form-input form-textarea" id="cikmisSoru" rows="3" placeholder="Soru metnini yaz..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Seçenekler</label>
          <div class="options-form">
            <div class="option-row" data-harf="A"><span class="option-harf">A</span><input class="form-input" type="text" placeholder="A şıkkı" /></div>
            <div class="option-row" data-harf="B"><span class="option-harf">B</span><input class="form-input" type="text" placeholder="B şıkkı" /></div>
            <div class="option-row" data-harf="C"><span class="option-harf">C</span><input class="form-input" type="text" placeholder="C şıkkı" /></div>
            <div class="option-row" data-harf="D"><span class="option-harf">D</span><input class="form-input" type="text" placeholder="D şıkkı" /></div>
            <div class="option-row" data-harf="E"><span class="option-harf">E</span><input class="form-input" type="text" placeholder="E şıkkı" /></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Doğru Cevap</label>
          <div class="chip-row" id="cikmisCevap">
            <button class="chip" data-value="A">A</button>
            <button class="chip" data-value="B">B</button>
            <button class="chip" data-value="C">C</button>
            <button class="chip" data-value="D">D</button>
            <button class="chip" data-value="E">E</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Açıklama <span class="optional">(opsiyonel)</span></label>
          <textarea class="form-input form-textarea" id="cikmisAciklama" rows="2" placeholder="Açıklama..."></textarea>
        </div>
        <p class="form-msg" id="cikmisMsg"></p>
        <button class="start-btn" id="cikmisKaydetBtn">
          Kaydet <span class="start-btn-icon">✓</span>
        </button>

        <hr style="border:none; border-top:1px solid var(--border); margin:24px 0;" />

        <h3 class="section-title" style="margin-bottom:12px;">Kayıtlı Çıkmış Sorular</h3>
        <div class="list-filters" style="display:flex; gap:8px;">
          <select class="form-input" id="cikmisListDonem" style="flex:1;">
            <option value="">Tüm dönemler</option>
            <option value="1">Dönem 1</option>
            <option value="2">Dönem 2</option>
            <option value="3">Dönem 3</option>
          </select>
          <input class="form-input" type="number" id="cikmisListYil" placeholder="Yıl (örn. 2025)" style="flex:1;" />
        </div>
        <div class="soru-listesi" id="cikmisListesi">
          <p class="liste-bos">Yüklemek için filtrele</p>
        </div>

        <div class="modal" id="cikmisModal" hidden>
          <div class="modal-card">
            <div class="modal-header">
              <h3 class="modal-title">Çıkmış Soruyu Düzenle</h3>
              <button class="modal-kapat" id="cikmisModalKapat">✕</button>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label class="form-label">Dönem</label>
                <div class="chip-row chip-row-equal" id="ceditDonem">
                  <button class="chip" data-value="1">D1</button>
                  <button class="chip" data-value="2">D2</button>
                  <button class="chip" data-value="3">D3</button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Yıl</label>
                <input class="form-input" type="number" id="ceditYil" />
              </div>
              <div class="form-group">
                <label class="form-label">Sınav Adı</label>
                <input class="form-input" type="text" id="ceditSinav" />
              </div>
              <div class="form-group">
                <label class="form-label">Kurul</label>
                <input class="form-input" type="text" id="ceditKurul" />
              </div>
              <div class="form-group">
                <label class="form-label">Ders</label>
                <input class="form-input" type="text" id="ceditDers" />
              </div>
              <div class="form-group">
                <label class="form-label">Sıra No</label>
                <input class="form-input" type="number" id="ceditSira" />
              </div>
              <div class="form-group">
                <label class="form-label">Soru</label>
                <textarea class="form-input form-textarea" id="ceditSoru" rows="3"></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Seçenekler</label>
                <div class="options-form">
                  <div class="option-row"><span class="option-harf">A</span><input class="form-input" type="text" id="ceditA" /></div>
                  <div class="option-row"><span class="option-harf">B</span><input class="form-input" type="text" id="ceditB" /></div>
                  <div class="option-row"><span class="option-harf">C</span><input class="form-input" type="text" id="ceditC" /></div>
                  <div class="option-row"><span class="option-harf">D</span><input class="form-input" type="text" id="ceditD" /></div>
                  <div class="option-row"><span class="option-harf">E</span><input class="form-input" type="text" id="ceditE" /></div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Doğru Cevap</label>
                <div class="chip-row" id="ceditCevap">
                  <button class="chip" data-value="A">A</button>
                  <button class="chip" data-value="B">B</button>
                  <button class="chip" data-value="C">C</button>
                  <button class="chip" data-value="D">D</button>
                  <button class="chip" data-value="E">E</button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Açıklama <span class="optional">(opsiyonel)</span></label>
                <textarea class="form-input form-textarea" id="ceditAciklama" rows="2"></textarea>
              </div>
              <p class="form-msg" id="ceditMsg"></p>
              <button class="start-btn" id="ceditKaydetBtn">
                Güncelle <span class="start-btn-icon">✓</span>
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- FLASHCARD EKLE -->
<section class="tab-content" id="tab-flash" hidden>
  <div class="form-group">
    <label class="form-label">Dönem</label>
    <div class="chip-row chip-row-equal" id="flashDonem">
      <button class="chip" data-value="1">D1</button>
      <button class="chip" data-value="2">D2</button>
      <button class="chip" data-value="3">D3</button>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Kurul</label>
    <input class="form-input" type="text" id="flashKurul" placeholder="örn. D2K5" />
  </div>
  <div class="form-group">
    <label class="form-label">Ders</label>
    <input class="form-input" type="text" id="flashDers" placeholder="örn. Anatomi" />
  </div>
  <div class="form-group">
    <label class="form-label">Ön Yüz (Kavram)</label>
    <textarea class="form-input form-textarea" id="flashOnYuz" rows="3" placeholder="Kavram veya soru..."></textarea>
  </div>
  <div class="form-group">
    <label class="form-label">Arka Yüz (Açıklama)</label>
    <textarea class="form-input form-textarea" id="flashArkaYuz" rows="4" placeholder="Açıklama veya cevap..."></textarea>
  </div>
  <p class="form-msg" id="flashMsg"></p>
  <button class="start-btn" id="flashKaydetBtn">
    Kaydet <span class="start-btn-icon">✓</span>
  </button>
</section>

    </main>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>

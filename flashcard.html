<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1C1A15" />
  <title>Flashcard · Moscos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,600;9..144,0,700;9..144,1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-frame flash-frame">

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Header -->
    <header class="profil-header">
      <button class="back-btn" id="exitBtn">←</button>
      <span class="profil-baslik" id="flashBaslik">Flashcard</span>
      <span class="flash-counter" id="flashCounter"></span>
    </header>

    <!-- İlerleme çubuğu -->
    <div class="flash-progress">
      <div class="flash-progress-fill" id="flashProgressFill"></div>
    </div>

    <!-- Kart alanı -->
    <main class="flash-main">

      <!-- Deste arka kartları -->
      <div class="card-stack" id="cardStack">
        <div class="card-back card-back-2"></div>
        <div class="card-back card-back-1"></div>
      </div>

      <!-- Ana kart -->
      <div class="flash-card" id="flashCard">
        <div class="flash-card-inner" id="flashCardInner">

          <!-- Ön yüz -->
          <div class="flash-card-front">
            <div class="card-side-label">KAVRAM</div>
            <p class="card-main-text" id="cardFront">—</p>
            <div class="card-tap-hint">dokunarak çevir</div>
          </div>

          <!-- Arka yüz -->
          <div class="flash-card-back">
            <div class="card-side-label back">AÇIKLAMA</div>
            <p class="card-main-text" id="cardBack">—</p>
          </div>

        </div>
      </div>

      <!-- Kaydırma yönü göstergesi -->
      <div class="swipe-hint" id="swipeHint">
        <span class="hint-left">✗ Zor</span>
        <span class="hint-up">↑ Atla</span>
        <span class="hint-right">✓ Kolay</span>
      </div>

    </main>

    <!-- Alt bilgi -->
    <footer class="flash-footer">
      <div class="flash-stats">
        <span class="fstat kolay" id="statKolay">0 Kolay</span>
        <span class="fstat atla" id="statAtla">0 Atla</span>
        <span class="fstat zor" id="statZor">0 Zor</span>
      </div>
    </footer>

  </div>

  <script type="module" src="js/flashcard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#E8B8B0" />
  <title>Simülasyon · Kurul Soru Bankası</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-frame" id="secimEkrani">

    <header class="app-header">
      <a href="index.html" class="admin-link" style="left:24px; right:auto;">←</a>
      <div class="brand">
        <span class="brand-mark">✦</span>
        <h1 class="brand-name">Simülasyon</h1>
      </div>
      <p class="brand-sub">Çıkmış Sınav Soruları</p>
    </header>

    <main class="app-main">

      <section class="hero">
        <p class="hero-eyebrow">Gerçek sınav hissi</p>
        <h2 class="hero-title">Hangi sınavı <em>çözmek istersin?</em></h2>
      </section>

      <section class="filters">

        <div class="filter-block">
          <span class="filter-label">Dönem</span>
          <div class="chip-row" id="simDonemChips">
            <button class="chip" disabled>Yükleniyor...</button>
          </div>
        </div>

        <div class="filter-block">
          <span class="filter-label">Yıl</span>
          <div class="chip-row" id="simYilChips">
            <button class="chip" disabled>Önce dönem</button>
          </div>
        </div>

        <div class="filter-block">
          <span class="filter-label">Sınav</span>
          <div class="chip-row" id="simSinavChips">
            <button class="chip" disabled>Önce yıl</button>
          </div>
        </div>

      </section>

    </main>

    <footer class="app-footer">
      <p class="available-info" id="simInfo">Filtrele ve başla</p>
      <button class="start-btn" id="simBaslaBtn" disabled>
        Simülasyonu Başlat
        <span class="start-btn-icon">→</span>
      </button>
    </footer>

  </div>

  <!-- SINAV EKRANI -->
  <div class="app-frame exam-frame" id="sinavEkrani" hidden>

    <header class="exam-header">
      <button class="exam-exit" id="simExitBtn">←</button>
      <div class="exam-progress">
        <span class="exam-counter" id="simCounter">0 / 0</span>
        <div class="progress-bar">
          <div class="progress-fill" id="simProgressFill"></div>
        </div>
      </div>
    </header>

    <main class="exam-main">
      <div class="question-meta">
        <span class="meta-pill" id="simMetaDers">—</span>
        <span class="meta-hedef" id="simMetaHedef"></span>
      </div>
      <h2 class="question-text" id="simQuestionText">Yükleniyor...</h2>
      <div class="options" id="simOptions"></div>
    </main>

    <footer class="exam-footer">
      <button class="nav-btn nav-prev" id="simPrevBtn" disabled>← Önceki</button>
      <button class="nav-btn nav-next" id="simNextBtn">Sonraki →</button>
      <button class="nav-btn nav-finish" id="simFinishBtn" hidden>Sınavı Bitir</button>
    </footer>

  </div>

  <script type="module" src="js/simulasyon.js"></script>
</body>
</html>
